en:
  heading: PDF Accessibility Remediation
  pdf:
    upload:
      heading: Remediate a PDF Document
      remaining_pages: You have remediated %{pages_used} pages so far. You have %{pages_left} pages remaining.
    index:
      link_to_upload: Upload a new PDF
    job_details:
      expiration: Files will be available to download for 24 hours after they have been remediated.
    privacy_notice:
      header: Accessible Version Generation Privacy Notice
      description: When your PDF is downloaded for the first time, an accessible version will be created to meet ADA Title II requirements
      adobe: Your file will be temporarily processed by Adobe to generate an accessible format.
      aws: Images will be temporarily sent to AWS Bedrock for AI-generated alt-text.
      manual_review: The accessible PDF will be added as a new version in ScholarSphere and reviewed manually by the Libraries' Adaptive Technology and Services team.
    quick_guide:
      heading: "PDF Remediation Tool: Quick Guide"
      block_one:
        heading: What this tool does
        bullet_one: Helps make your PDF documents more accessible for people using screen readers and other assistive technologies.
        bullet_two: Supports the University's ADA Title II accessibility requirements, which take effect April 24, 2026. 
        bullet_three: Automatically improves document structure and generates alt text for images.
      block_two:
        heading: What to expect
        bullet_one: Most documents will be significantly improved; some may still need small manual corrections. 
      block_three:
        heading: What you can upload
        bullet_one: PDF files only.
        bullet_two: Please do not upload documents containing sensitive, confidential, or restricted information.
        bullet_three: Uploaded files are automatically deleted after 24 hours.
      block_four:
        heading: Daily upload limit 
        bullet_one: You may upload up to <strong>50 pages per day.</strong>
        bullet_two: If you need help with a larger document, please contact the Digital Accessibility Queue. (link)
      block_five:
        heading: What this tool does not fix
        bullet_one: Fillable form fields
        bullet_two: Color contrast issues
        bullet_three: Some complex tables, images, or layouts
    help_page:
      heading: Help and support 
      subheading: Resources and support are available to help you successfully remediate your documents and ensure they meet accessibility standards 
      bullet_one_a: Get started with the Quick Start Guide
      bullet_one_b: <a href="">Follow these simple steps</a> to prepare, submit, and review your document.
      bullet_two_a: Prepare your file for submission 
      bullet_two_b: Reviewing the <a href="">file preparation guidelines</a> helps ensure accurate and reliable remediation results. (Link to File Preparation Guidelines)
      bullet_three_a: Review and finalize your remediated document
      bullet_three_b: Use the <a href="">manual review guide</a> to confirm accessibility and make any necessary adjustments.
      bullet_four_a: Connect with your Accessibility Liaison (Penn State login required)
      bullet_four_b: Accessibility Liaisons are available across the University to provide guidance and support.
      bullet_five_a: Report a technical issue
      bullet_five_b: <a href="">Submit a request</a> if you encounter a problem with the tool so our team can assist.
      bullet_six_a: Share feedback or suggestions
      bullet_six_b: Your feedback helps us continue improving accessibility services and tools.
      bullet_seven_a: Contact the Accessibility Team
      bullet_seven_b: "For additional assistance, please contact: accessibility@psu.edu"
